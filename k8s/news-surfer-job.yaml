# k8s/news-surfer-job.yaml
# This is a template/example of the Job that will be created by the FastAPI application.
# The FastAPI app will construct a similar object programmatically.
apiVersion: batch/v1
kind: Job
metadata:
  name: news-surfer-job-example # Name will be generated by FastAPI
  labels:
    app: news-surfer-job
    # task_id: <dynamic-task-id> # Will be added by FastAPI app
spec:
  ttlSecondsAfterFinished: 3600 # Automatically clean up finished jobs after 1 hour
  backoffLimit: 1 # Number of retries before considering a Job as failed
  template: # Pod template
    metadata:
      labels:
        app: news-surfer-job
        # task_id: <dynamic-task-id> # Will be added by FastAPI app
    spec:
      restartPolicy: Never
      containers:
      - name: news-surfer-runner # Must match container name used in main.py for log retrieval
        image: your-container-registry/news-job-runner:latest # Replace with your actual image path
        env:
        - name: WEBSURFER_TASK
          value: "Example task: Summarize something from a website." # This will be set dynamically
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: openai-api-key-secret
              key: OPENAI_API_KEY
        - name: PYTHONUNBUFFERED
          value: "1"
        # Optional environment variables for run_web_surfer_task.py:
        # - name: OPENAI_MODEL
        #   value: "gpt-4"
        # - name: LLM_TEMPERATURE
        #   value: "0.5"
        # - name: PLAYWRIGHT_BROWSER_TYPE
        #   value: "chromium"
        # - name: PLAYWRIGHT_HEADLESS
        #   value: "true"
        resources:
          requests:
            cpu: "0.5"
            memory: "512Mi"
          limits:
            cpu: "1"
            memory: "2Gi"
      # serviceAccountName: default # Explicitly stating, though often default if not specified
